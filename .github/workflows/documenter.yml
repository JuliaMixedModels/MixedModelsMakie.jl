name: Documenter
concurrency:
  group: ${{ github.head_ref }}.documenter
  cancel-in-progress: true
on:
  push:
    branches:
      - main
    tags: [v*]
    paths-ignore:
      - 'LICENSE.md'
      - 'README.md'
      - 'examples/**'
  pull_request:
    branches:
      - main
    paths-ignore:
      - 'LICENSE.md'
      - 'README.md'
      - 'examples/**'
permissions: {}
jobs:
  Documenter:
    name: Documentation
    runs-on: ubuntu-22.04
    permissions:
      contents: write
      statuses: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: julia-actions/setup-julia@f6f565d9f7cf12f53dc8045742460d6260ad3b39 # v3
        with:
          version: 1
      - uses: julia-actions/cache@a45e8fa8be21c18a06b7177052533149e61e9b38 # v3
        with:
          cache-compiled: "true"
      - uses: julia-actions/julia-buildpkg@e3eb439fad4f9aba7da2667e7510e4a46ebc46e1 # v1.7.0
      - uses: julia-actions/julia-docdeploy@e62cc8fd639797a0c2922a437d5b1b81c4a12787 # v1.3.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DOCUMENTER_KEY: ${{ secrets.DOCUMENTER_KEY }}
