name: continuous-integration
concurrency:
  group: ${{ github.head_ref }}.ci
  cancel-in-progress: true
on:
  push:
    branches:
      - main
    paths-ignore:
      - 'LICENSE.md'
      - 'README.md'
      - 'examples/**'
  pull_request:
    branches:
      - main
    paths-ignore:
      - 'LICENSE.md'
      - 'README.md'
      - 'examples/**'
permissions: {}
jobs:
  ci:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      matrix:
        version: [min, 1]
        os: [ubuntu-22.04, macos-14]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Julia Setup
        uses: julia-actions/setup-julia@f6f565d9f7cf12f53dc8045742460d6260ad3b39 # v3
        with:
          version: ${{ matrix.version }}
      - name: Cache
        uses: julia-actions/cache@a45e8fa8be21c18a06b7177052533149e61e9b38 # v3
        with:
          cache-compiled: "true"
      - name: Build
        uses: julia-actions/julia-buildpkg@e3eb439fad4f9aba7da2667e7510e4a46ebc46e1 # v1
      - name: Test
        uses: julia-actions/julia-runtest@d60b785c6f2bdf4ebfb18b2b6f7d93b7dfb0efe3 # v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Percy Upload
        if: ${{ matrix.version == 'min' }}
        run: |
          ls ./test/output/ # useful for debugging
          npx @percy/cli upload ./test/output
        env:
          PERCY_TOKEN: ${{ secrets.PERCY_TOKEN }}
      - name: Coverage Process
        uses: julia-actions/julia-processcoverage@03114f09f119417c3242a9fb6e0b722676aedf38 # v1
      - name: Coverage Upload
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
